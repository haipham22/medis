name: Build Medis

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Build application
        run: |
          npm run build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Package for ${{ matrix.platform }}
        run: |
          npm run pack:${{ matrix.platform }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v3
        with:
          name: medis-linux-${{ github.sha }}
          path: |
            dist/*.AppImage
            dist/*.tar.gz
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v3
        with:
          name: medis-mac-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v3
        with:
          name: medis-windows-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*/*.AppImage
            dist/*/*.tar.gz
            dist/*/*.dmg
            dist/*/*.zip
            dist/*/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
